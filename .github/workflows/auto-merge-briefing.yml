name: Auto-merge Claude Briefing PRs

# Claude가 만든 브리핑 PR을 자동으로 main에 머지합니다.
# 트리거: PR이 열리거나, 라벨이 추가되거나, 동기화될 때
on:
  pull_request:
    types: [opened, synchronize, labeled, reopened]
  # 매시간 정각에도 한 번씩 체크 (놓친 PR 잡기용)
  schedule:
    - cron: '0 * * * *'
  # 수동 트리거도 가능
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check open PRs from claude branches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            
            // 열려있는 모든 PR 가져오기
            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 50
            });
            
            console.log(`Found ${prs.data.length} open PRs`);
            
            for (const pr of prs.data) {
              // claude/ 로 시작하는 브랜치만 처리
              if (!pr.head.ref.startsWith('claude/')) {
                console.log(`Skipping PR #${pr.number}: not a claude branch (${pr.head.ref})`);
                continue;
              }
              
              // 변경된 파일이 briefings/*.md 인지 확인
              const files = await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: pr.number
              });
              
              const allBriefingFiles = files.data.every(f => 
                f.filename.startsWith('briefings/') && f.filename.endsWith('.md')
              );
              
              if (!allBriefingFiles) {
                console.log(`Skipping PR #${pr.number}: contains non-briefing files`);
                continue;
              }
              
              // 머지 가능 상태 확인
              const prDetail = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number
              });
              
              if (prDetail.data.mergeable === false) {
                console.log(`PR #${pr.number} has conflicts, skipping`);
                continue;
              }
              
              try {
                // main에 squash merge
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: pr.title,
                  commit_message: `Auto-merged briefing from ${pr.head.ref}`
                });
                
                console.log(`✅ Merged PR #${pr.number}: ${pr.title}`);
                
                // 머지 후 브랜치 삭제
                try {
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `heads/${pr.head.ref}`
                  });
                  console.log(`🗑️  Deleted branch: ${pr.head.ref}`);
                } catch (deleteErr) {
                  console.log(`Branch deletion failed: ${deleteErr.message}`);
                }
                
              } catch (mergeErr) {
                console.error(`Failed to merge PR #${pr.number}: ${mergeErr.message}`);
              }
            }
