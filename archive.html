<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>브리핑 아카이브 · Morning Briefing</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --bg-elev: #ffffff;
      --bg-sunk: #f6f7f9;
      --bg-sunk-2: #eef0f4;
      --ink: #0b1220;
      --ink-2: #2b3340;
      --ink-3: #5b6473;
      --ink-4: #939aa6;
      --ink-5: #c5c9d2;
      --line: #e6e8ee;
      --line-soft: #eef0f4;
      --accent: #1d3a8a;
      --accent-strong: #142a66;
      --accent-soft: #e8edfa;
      --accent-ink: #0d1f4d;
      --radius: 14px;
      --radius-sm: 10px;
    }

    :root.dark {
      --bg: #0b0e15;
      --bg-elev: #11151e;
      --bg-sunk: #161b27;
      --bg-sunk-2: #1d2330;
      --ink: #f1f3f8;
      --ink-2: #c8cdd8;
      --ink-3: #8a92a3;
      --ink-4: #5b6273;
      --ink-5: #383e4c;
      --line: #1f2531;
      --line-soft: #181d27;
      --accent: #6b8bff;
      --accent-strong: #8aa3ff;
      --accent-soft: #1a2247;
      --accent-ink: #b9caff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      font-feature-settings: "ss01", "tnum";
    }
    body { padding-top: env(safe-area-inset-top); }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    /* ---------- Top bar ---------- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .brand-mark {
      font-weight: 700;
      font-size: 17px;
      color: var(--accent);
    }
    .brand-mark::before {
      content: "";
      display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      margin-right: 8px;
      transform: translateY(-2px);
    }
    .brand-label {
      font-size: 17px;
      color: var(--accent);
      letter-spacing: -0.01em;
      font-weight: 700;
    }
    .top-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--bg-elev);
      color: var(--ink-2);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.15s ease;
      font-family: inherit;
      text-decoration: none;
    }
    .icon-btn:hover { border-color: var(--ink-4); color: var(--ink); }
    .icon-btn:active { transform: scale(0.96); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ---------- Archive header ---------- */
    .archive-header {
      padding-bottom: 24px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }
    .archive-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding: 5px 10px;
      background: var(--accent-soft);
      border-radius: 999px;
    }
    .archive-header h1 {
      font-size: clamp(24px, 6vw, 36px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .archive-header h1 span { color: var(--accent); }
    .archive-header p {
      font-size: 14px;
      color: var(--ink-3);
      font-weight: 500;
    }

    /* ---------- Calendar ---------- */
    .calendar-wrap {
      background: var(--bg-sunk);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
    }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .cal-nav-btn {
      width: 34px; height: 34px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: var(--bg-elev);
      color: var(--ink-3);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .cal-nav-btn:hover { border-color: var(--ink-4); color: var(--ink); }
    .cal-nav-btn:active { transform: scale(0.95); }
    .cal-nav-btn svg { width: 14px; height: 14px; }
    .cal-month-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }
    .cal-wd {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-cell {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 9px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink-4);
      position: relative;
      transition: all 0.15s ease;
    }
    .cal-cell.today {
      color: var(--accent);
      font-weight: 700;
    }
    .cal-cell.today::after {
      content: '';
      position: absolute;
      bottom: 5px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }
    .cal-cell.has-brief {
      color: var(--ink);
      font-weight: 600;
      cursor: pointer;
      background: var(--bg-elev);
      border: 1px solid var(--line-soft);
    }
    .cal-cell.has-brief:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }
    .cal-cell.has-brief:active { transform: scale(0.94); }
    .cal-cell.active-brief {
      background: var(--accent) !important;
      color: #fff !important;
      border-color: var(--accent) !important;
      font-weight: 700;
    }
    .cal-cell.active-brief::after { background: rgba(255,255,255,0.5); }

    /* ---------- Briefing viewer ---------- */
    #briefing-section {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    #briefing-section.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-3);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      padding: 0;
      transition: color 0.15s ease;
    }
    .back-btn:hover { color: var(--accent); }
    .back-btn svg { width: 14px; height: 14px; }
    .back-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      margin-left: auto;
    }

    /* ---------- Story ---------- */
    .story {
      padding: 22px 22px 24px;
      margin-bottom: 36px;
      background: var(--bg-sunk);
      border-radius: var(--radius);
      border: 1px solid var(--line-soft);
    }
    .story-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .story p {
      font-size: clamp(15px, 3.5vw, 17px);
      line-height: 1.6;
      letter-spacing: -0.012em;
      color: var(--ink);
      font-weight: 500;
      text-wrap: pretty;
    }
    .story p + p { margin-top: 10px; }

    /* ---------- Category ---------- */
    .category { margin-bottom: 40px; }
    .cat-head {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding-bottom: 12px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }
    .cat-num {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
      color: var(--accent);
      min-width: 24px;
      font-variant-numeric: tabular-nums;
    }
    .cat-title {
      flex: 1;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.015em;
    }
    .cat-sub {
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ---------- Item (accordion) ---------- */
    .item {
      border-bottom: 1px solid var(--line-soft);
      transition: background 0.15s ease;
    }
    .item:last-child { border-bottom: none; }
    .item-head {
      list-style: none;
      cursor: pointer;
      padding: 18px 4px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      user-select: none;
    }
    .item-head::-webkit-details-marker { display: none; }
    .item-headline {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--ink);
      letter-spacing: -0.012em;
      text-wrap: balance;
    }
    .item-summary {
      font-size: 14px;
      color: var(--ink-3);
      line-height: 1.55;
      margin-top: 6px;
      text-wrap: pretty;
      font-weight: 500;
    }
    .item-toggle {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--ink-3);
      transition: all 0.2s ease;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--bg-elev);
    }
    .item-toggle svg { width: 12px; height: 12px; transition: transform 0.25s ease; }
    .item[open] .item-toggle {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .item[open] .item-toggle svg { transform: rotate(45deg); }

    .item-body {
      padding: 4px 4px 24px;
      animation: fadeIn 0.3s ease;
    }
    .item-body .block { padding: 14px 0 0; }
    .item-body .block + .block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed var(--line);
    }
    .item-body h4 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .item-body p {
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--ink-2);
      margin-bottom: 10px;
      text-wrap: pretty;
      font-weight: 400;
    }
    .item-body p:last-child { margin-bottom: 0; }
    .item-body strong { color: var(--ink); font-weight: 700; }

    .item-body table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      margin: 12px 0;
      background: var(--bg-sunk);
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--line-soft);
    }
    .item-body th, .item-body td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--line-soft);
    }
    .item-body tr:last-child th, .item-body tr:last-child td { border-bottom: none; }
    .item-body th {
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
      font-weight: 700;
      background: var(--bg-sunk-2);
    }
    .item-body td { color: var(--ink-2); font-weight: 500; }

    /* ---------- Market bar ---------- */
    .market-bar {
      margin-top: 32px;
      padding: 18px 20px;
      background: var(--bg-sunk);
      border-radius: var(--radius);
      border: 1px solid var(--line-soft);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .market-bar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      padding-top: 2px;
    }
    .market-bar-text {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--ink-2);
      font-weight: 500;
    }

    /* ---------- Loading / States ---------- */
    .state { text-align: center; padding: 60px 20px; }
    .state-mark {
      display: inline-grid;
      place-items: center;
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .state-title { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.015em; }
    .state-sub { font-size: 14px; color: var(--ink-3); }

    .skeleton {
      background: linear-gradient(90deg, var(--line-soft) 0%, var(--bg-sunk) 50%, var(--line-soft) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ---------- Footer ---------- */
    .footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 12px;
      color: var(--ink-4);
      font-weight: 500;
    }
    .footer a {
      color: var(--ink-3);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s ease;
    }
    .footer a:hover { color: var(--accent); }

    @media (max-width: 480px) {
      .container { padding: 20px 16px 60px; }
      .archive-header { padding-bottom: 20px; margin-bottom: 22px; }
      .calendar-wrap { padding: 16px; }
      .cal-cell { font-size: 12.5px; border-radius: 7px; }
      .item-head { padding: 16px 2px; }
      .item-headline { font-size: 15.5px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="index.html" class="brand" aria-label="홈으로">
        <span class="brand-mark">Morning</span>
        <span class="brand-label">Briefing</span>
      </a>
      <div class="top-actions">
        <button class="icon-btn" id="theme-toggle" aria-label="테마 전환" title="테마 전환">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 9.5A5 5 0 1 1 6.5 2.5a4 4 0 0 0 7 7Z"/>
          </svg>
        </button>
      </div>
    </div>

    <header class="archive-header">
      <div class="archive-eyebrow">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:10px;height:10px">
          <rect x=".5" y="1.5" width="11" height="10" rx="1"/>
          <path d="M.5 4.5h11M3.5.5v2M8.5.5v2"/>
        </svg>
        아카이브
      </div>
      <h1>지난 <span>브리핑</span> 모아보기</h1>
      <p>날짜를 선택하면 그날의 브리핑을 볼 수 있어요</p>
    </header>

    <!-- Calendar -->
    <div class="calendar-wrap" id="calendar-area">
      <div class="state">
        <div style="height:14px;width:120px;border-radius:6px;" class="skeleton" style="margin:0 auto 8px;"></div>
        <div style="height:200px;width:100%;border-radius:10px;" class="skeleton"></div>
      </div>
    </div>

    <!-- Briefing viewer -->
    <section id="briefing-section">
      <div class="back-bar">
        <button class="back-btn" id="back-btn">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 2L4 7l5 5"/>
          </svg>
          달력으로
        </button>
        <span class="back-date" id="back-date"></span>
      </div>
      <div id="briefing-content"></div>
    </section>

    <footer class="footer">
      <span>Morning Briefing © 2026</span>
      <a href="index.html">← 오늘의 브리핑</a>
    </footer>
  </div>

  <script>
    // ---------- Theme ----------
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('eb-theme');
    if (savedTheme === 'dark') root.classList.add('dark');

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = root.classList.toggle('dark');
      localStorage.setItem('eb-theme', isDark ? 'dark' : 'light');
      const tc = document.querySelector('meta[name="theme-color"]');
      if (tc) tc.setAttribute('content', isDark ? '#0b0e15' : '#ffffff');
    });

    // ---------- Categories ----------
    const CATS = [
      { key: 'US',      title: '미국 · 정치 · 정책',   sub: 'Washington'  },
      { key: 'ASIA',    title: '아시아 · 반도체',       sub: 'Asia'        },
      { key: 'ME',      title: '중동 · 유럽 · 지정학',  sub: 'Geopolitics' },
      { key: 'CAPITAL', title: '글로벌 자본 · 환율',    sub: 'Capital'     },
    ];
    const CAT_MAP = Object.fromEntries(CATS.map(c => [c.key, c]));

    // ---------- State ----------
    let allDates = new Set();     // 'YYYY-MM-DD' strings with briefings
    let viewYear, viewMonth;      // currently shown month
    let activeDate = null;        // currently selected date

    // ---------- Init ----------
    async function init() {
      const today = new Date();
      viewYear = today.getFullYear();
      viewMonth = today.getMonth(); // 0-based

      // Check URL hash for deep-link (e.g. #2026-04-30)
      const hash = location.hash.slice(1);
      if (/^\d{4}-\d{2}-\d{2}$/.test(hash)) {
        activeDate = hash;
        const d = new Date(hash);
        viewYear = d.getFullYear();
        viewMonth = d.getMonth();
      }

      await loadDateList();
      renderCalendar();

      if (activeDate) {
        await loadBriefing(activeDate);
      }
    }

    async function loadDateList() {
      try {
        const r = await fetch('https://api.github.com/repos/bwkim1025/daily-briefings/contents/briefings');
        if (!r.ok) throw new Error();
        const files = await r.json();
        files.forEach(f => {
          const m = f.name.match(/^(\d{4}-\d{2}-\d{2})\.md$/);
          if (m) allDates.add(m[1]);
        });
      } catch (e) {
        console.error('브리핑 목록 로드 실패', e);
      }
    }

    // ---------- Calendar Render ----------
    function renderCalendar() {
      const area = document.getElementById('calendar-area');
      const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];
      const today = new Date();
      const todayStr = toDateStr(today);

      const monthLabel = `${viewYear}년 ${viewMonth + 1}월`;
      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      let cells = '';
      // Empty cells before the 1st
      for (let i = 0; i < firstDay; i++) {
        cells += `<div class="cal-cell"></div>`;
      }
      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${viewYear}-${String(viewMonth + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasBrief = allDates.has(ds);
        const isToday = ds === todayStr;
        const isActive = ds === activeDate;
        const classes = ['cal-cell',
          hasBrief ? 'has-brief' : '',
          isToday ? 'today' : '',
          isActive ? 'active-brief' : ''
        ].filter(Boolean).join(' ');
        const click = hasBrief ? `onclick="selectDate('${ds}')"` : '';
        cells += `<div class="${classes}" ${click}>${d}</div>`;
      }

      area.innerHTML = `
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)" aria-label="이전 달">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 2L4 7l5 5"/>
            </svg>
          </button>
          <span class="cal-month-label">${monthLabel}</span>
          <button class="cal-nav-btn" onclick="changeMonth(1)" aria-label="다음 달">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 2l5 5-5 5"/>
            </svg>
          </button>
        </div>
        <div class="cal-weekdays">${WEEKDAYS.map(w => `<div class="cal-wd">${w}</div>`).join('')}</div>
        <div class="cal-grid">${cells}</div>
      `;
    }

    function changeMonth(delta) {
      viewMonth += delta;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
      renderCalendar();
    }

    function toDateStr(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // ---------- Date Selection ----------
    async function selectDate(dateStr) {
      if (activeDate === dateStr) return;
      activeDate = dateStr;
      history.replaceState(null, '', `#${dateStr}`);
      renderCalendar();
      await loadBriefing(dateStr);
      document.getElementById('briefing-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      activeDate = null;
      history.replaceState(null, '', location.pathname);
      document.getElementById('briefing-section').classList.remove('visible');
      renderCalendar();
      document.getElementById('calendar-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // ---------- Briefing Loader ----------
    async function loadBriefing(dateStr) {
      const section = document.getElementById('briefing-section');
      const contentEl = document.getElementById('briefing-content');
      const backDate = document.getElementById('back-date');

      section.classList.add('visible');
      contentEl.innerHTML = `<div style="padding:40px 0;text-align:center;color:var(--ink-4);font-size:14px;">브리핑 불러오는 중…</div>`;

      try {
        const r = await fetch(`https://raw.githubusercontent.com/bwkim1025/daily-briefings/main/briefings/${dateStr}.md`);
        if (!r.ok) throw new Error('파일 없음');
        const md = await r.text();
        const data = parseMarkdown(md);
        backDate.textContent = formatDateLong(dateStr);
        contentEl.innerHTML = renderBriefing(data);
      } catch (e) {
        contentEl.innerHTML = `<div class="state"><div class="state-mark">!</div><div class="state-title">불러오기 실패</div><div class="state-sub">잠시 후 다시 시도해 주세요.</div></div>`;
      }
    }

    // ---------- Parser ----------
    function parseMarkdown(md) {
      const result = { date: '', todaysStory: '', categories: {}, market: '' };
      const lines = md.split('\n');
      let mode = null, currentCat = null, currentItem = null, currentSection = null;
      let buffer = [];
      const flush = () => {
        if (currentSection && currentItem) {
          currentItem[currentSection] = buffer.join('\n').trim();
        } else if (mode === 'TODAYS_STORY') {
          result.todaysStory = buffer.join('\n').trim();
        } else if (mode === 'MARKET' || mode === 'ONE_LINER') {
          result.market = buffer.join('\n').trim();
        }
        buffer = [];
      };
      for (const line of lines) {
        const dateMatch = line.match(/^#\s+(\d{4}-\d{2}-\d{2})/);
        if (dateMatch) { result.date = dateMatch[1]; continue; }
        const h2 = line.match(/^##\s+(\w+)/);
        if (h2) {
          flush();
          const tag = h2[1].toUpperCase();
          if (tag === 'TODAYS_STORY') {
            mode = tag; currentCat = null; currentItem = null;
          } else if (tag === 'MARKET' || tag === 'ONE_LINER') {
            mode = 'MARKET'; currentCat = null; currentItem = null;
          } else if (CAT_MAP[tag]) {
            mode = 'CATEGORY'; currentCat = tag;
            result.categories[tag] = []; currentItem = null;
          }
          currentSection = null;
          continue;
        }
        const h3 = line.match(/^###\s+(.+)/);
        if (h3 && mode === 'CATEGORY') {
          flush();
          currentItem = { headline: h3[1].trim(), summary: '', whyItMatters: '', context: '', marketImplication: '' };
          result.categories[currentCat].push(currentItem);
          currentSection = 'summary';
          continue;
        }
        const h4 = line.match(/^####\s+(.+)/);
        if (h4 && currentItem) {
          flush();
          const sec = h4[1].toLowerCase().trim();
          if (sec.startsWith('why')) currentSection = 'whyItMatters';
          else if (sec.startsWith('context')) currentSection = 'context';
          else if (sec.startsWith('market')) currentSection = 'marketImplication';
          continue;
        }
        if (line.trim() === '---') continue;
        buffer.push(line);
      }
      flush();
      return result;
    }

    // ---------- Renderer ----------
    function renderBriefing(data) {
      let categoriesHtml = '';
      let catIdx = 0;
      for (const cat of CATS) {
        const items = data.categories[cat.key] || [];
        if (!items.length) continue;
        catIdx++;
        const num = String(catIdx).padStart(2,'0');
        let itemsHtml = '';
        for (const it of items) {
          const blocks = [];
          if (it.whyItMatters)      blocks.push(`<div class="block"><h4>왜 중요한가</h4>${mdToHtml(it.whyItMatters)}</div>`);
          if (it.context)           blocks.push(`<div class="block"><h4>배경</h4>${mdToHtml(it.context)}</div>`);
          if (it.marketImplication) blocks.push(`<div class="block"><h4>시장 영향</h4>${mdToHtml(it.marketImplication)}</div>`);
          itemsHtml += `
            <details class="item">
              <summary class="item-head">
                <div>
                  <div class="item-headline">${escapeHtml(it.headline)}</div>
                  ${it.summary ? `<div class="item-summary">${mdInline(it.summary)}</div>` : ''}
                </div>
                <span class="item-toggle" aria-hidden="true">
                  <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <path d="M6 1.5v9M1.5 6h9"/>
                  </svg>
                </span>
              </summary>
              <div class="item-body">${blocks.join('')}</div>
            </details>`;
        }
        categoriesHtml += `
          <section class="category">
            <div class="cat-head">
              <span class="cat-num">${num}</span>
              <span class="cat-title">${cat.title}</span>
              <span class="cat-sub">${cat.sub}</span>
            </div>
            ${itemsHtml}
          </section>`;
      }

      const marketHtml = data.market ? `
        <div class="market-bar">
          <span class="market-bar-label">Market</span>
          <span class="market-bar-text">${mdInline(data.market)}</span>
        </div>` : '';

      const storyHtml = data.todaysStory ? `
        <section class="story">
          <div class="story-label">오늘의 흐름</div>
          ${data.todaysStory.split('\n').filter(l=>l.trim()).map(l=>`<p>${mdInline(l)}</p>`).join('')}
        </section>` : '';

      return storyHtml + categoriesHtml + marketHtml;
    }

    // ---------- Markdown helpers ----------
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function mdInline(s) {
      return escapeHtml(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    function mdToHtml(md) {
      if (!md) return '';
      const lines = md.split('\n');
      let html = '', para = [], tableRows = [], inTable = false;
      const flushPara = () => {
        if (para.length) { html += `<p>${para.join(' ').trim()}</p>`; para = []; }
      };
      const flushTable = () => {
        if (!tableRows.length) return;
        let header = null, body = [];
        for (let i = 0; i < tableRows.length; i++) {
          if (tableRows[i].every(c => /^:?-{2,}:?$/.test(c.trim()))) {
            header = tableRows[i - 1] || null; body = tableRows.slice(i + 1); break;
          }
        }
        if (!header) { header = tableRows[0]; body = tableRows.slice(1); }
        html += '<table>';
        if (header) html += '<tr>' + header.map(c => `<th>${mdInline(c.trim())}</th>`).join('') + '</tr>';
        for (const row of body) html += '<tr>' + row.map(c => `<td>${mdInline(c.trim())}</td>`).join('') + '</tr>';
        html += '</table>';
        tableRows = []; inTable = false;
      };
      for (const line of lines) {
        if (/^\s*\|.*\|\s*$/.test(line)) {
          flushPara();
          tableRows.push(line.trim().replace(/^\||\|$/g, '').split('|'));
          inTable = true; continue;
        }
        if (inTable) flushTable();
        if (line.trim() === '') flushPara();
        else para.push(mdInline(line.trim()));
      }
      flushPara(); if (inTable) flushTable();
      return html;
    }

    function formatDateLong(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T21:00:00+09:00');
      const days = ['일','월','화','수','목','금','토'];
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${d.getFullYear()}.${m}.${day} · ${days[d.getDay()]}요일`;
    }

    // ---------- Start ----------
    init();
  </script>
