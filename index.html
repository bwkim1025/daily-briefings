<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저녁 브리핑</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0e0c">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Evening">

  <!-- Fonts -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0e0c;
      --bg-card: #1a1815;
      --bg-card-hover: #211e1a;
      --ink: #ebe8df;
      --ink-muted: #8a857a;
      --line: #2a2620;
      --us: #e8b04a;
      --asia: #e74c3c;
      --me: #7b9e89;
      --capital: #6d8ebd;
    }
    * { box-sizing: border-box; }
    html, body {
      background: var(--bg);
      color: var(--ink);
      margin: 0;
      padding: 0;
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .container { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .header { padding: 1rem 0 2rem; border-bottom: 1px solid var(--line); margin-bottom: 2rem; }
    .date { font-family: 'Fraunces', serif; font-size: .95rem; color: var(--ink-muted); letter-spacing: .05em; text-transform: uppercase; }
    .title { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 500; margin: .4rem 0 0; letter-spacing: -.01em; }
    .story { background: var(--bg-card); border-left: 3px solid var(--us); padding: 1.25rem 1.5rem; border-radius: 0 .5rem .5rem 0; margin-bottom: 2.5rem; font-family: 'Fraunces', serif; font-size: 1.05rem; line-height: 1.7; }
    .category { margin-bottom: 2.5rem; }
    .category-header { font-size: .78rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; padding-bottom: .6rem; margin-bottom: 1rem; border-bottom: 2px solid; }
    .cat-us .category-header { color: var(--us); border-color: var(--us); }
    .cat-asia .category-header { color: var(--asia); border-color: var(--asia); }
    .cat-me .category-header { color: var(--me); border-color: var(--me); }
    .cat-capital .category-header { color: var(--capital); border-color: var(--capital); }
    details.item { background: var(--bg-card); border-radius: .6rem; margin-bottom: .6rem; overflow: hidden; transition: background .2s; }
    details.item[open] { background: var(--bg-card-hover); }
    summary.item-head { list-style: none; cursor: pointer; padding: 1rem 1.25rem; display: grid; grid-template-columns: 1fr auto; align-items: start; gap: 1rem; }
    summary.item-head::-webkit-details-marker { display: none; }
    .item-headline { font-weight: 600; font-size: 1rem; line-height: 1.5; }
    .item-summary { font-size: .88rem; color: var(--ink-muted); margin-top: .3rem; line-height: 1.55; }
    .item-toggle { color: var(--ink-muted); font-size: 1.1rem; transition: transform .2s; align-self: center; }
    details[open] .item-toggle { transform: rotate(45deg); }
    .item-body { padding: 0 1.25rem 1.25rem; border-top: 1px solid var(--line); padding-top: 1rem; margin-top: .5rem; }
    .item-body h4 { font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-muted); margin: 1.1rem 0 .4rem; }
    .item-body h4:first-child { margin-top: 0; }
    .item-body p { margin: 0 0 .8rem; font-size: .95rem; }
    .item-body table { width: 100%; border-collapse: collapse; font-size: .88rem; margin: .5rem 0 .8rem; }
    .item-body th, .item-body td { padding: .5rem .7rem; text-align: left; border-bottom: 1px solid var(--line); }
    .item-body th { color: var(--ink-muted); font-weight: 600; }
    .oneliner { margin-top: 2.5rem; padding: 1.5rem; background: var(--bg-card); border-radius: .6rem; border-top: 3px solid var(--ink); font-family: 'Fraunces', serif; font-size: 1.1rem; line-height: 1.6; text-align: center; }
    .oneliner-label { font-family: 'Pretendard Variable', sans-serif; font-size: .7rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: .6rem; }
    .footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--line); font-size: .78rem; color: var(--ink-muted); text-align: center; }
    .footer a { color: var(--ink-muted); text-decoration: none; border-bottom: 1px dotted var(--ink-muted); margin: 0 .8rem; }
    .loading { text-align: center; padding: 4rem 1rem; color: var(--ink-muted); font-family: 'Fraunces', serif; }
    .empty { text-align: center; padding: 4rem 1rem; color: var(--ink-muted); }
    .empty .big { font-family: 'Fraunces', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: 1rem; }
    @media (max-width: 480px) {
      .container { padding: 1.5rem 1rem 3rem; }
      .title { font-size: 1.6rem; }
      .story { font-size: .98rem; padding: 1rem 1.1rem; }
      .item-headline { font-size: .95rem; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">불러오는 중…</div>
  </div>

  <script>
    const CAT_NAMES = {
      US: '미국 · 정치 · 정책',
      ASIA: '아시아 · 반도체 · 공급망',
      ME: '중동·유럽 · 지정학',
      CAPITAL: '글로벌 자본'
    };
    const CAT_CLASSES = {
      US: 'cat-us', ASIA: 'cat-asia', ME: 'cat-me', CAPITAL: 'cat-capital'
    };

    // GitHub API로 briefings 폴더의 .md 파일 목록 가져오기
    async function fetchLatestBriefing() {
      const apiUrl = 'https://api.github.com/repos/bwkim1025/evening-briefing/contents/briefings';
      const r = await fetch(apiUrl);
      if (!r.ok) throw new Error('GitHub API 호출 실패');
      const files = await r.json();
      
      const mdFiles = files
        .filter(f => f.name.endsWith('.md') && f.name !== '.gitkeep')
        .sort((a, b) => b.name.localeCompare(a.name));
      
      if (!mdFiles.length) return null;
      
      // 가장 최신 파일 raw 내용 가져오기
      const contentResp = await fetch(mdFiles[0].download_url);
      const md = await contentResp.text();
      return md;
    }

    function parseMarkdown(md) {
      const result = { date: '', todaysStory: '', categories: {}, oneLiner: '' };
      const lines = md.split('\n');
      let mode = null, currentCat = null, currentItem = null, currentSection = null;
      let buffer = [];

      const flush = () => {
        if (currentSection && currentItem) {
          currentItem[currentSection] = buffer.join('\n').trim();
        } else if (mode === 'TODAYS_STORY') {
          result.todaysStory = buffer.join('\n').trim();
        } else if (mode === 'ONE_LINER') {
          result.oneLiner = buffer.join('\n').trim();
        }
        buffer = [];
      };

      for (const line of lines) {
        const dateMatch = line.match(/^#\s+(\d{4}-\d{2}-\d{2})/);
        if (dateMatch) { result.date = dateMatch[1]; continue; }

        const h2 = line.match(/^##\s+(\w+)/);
        if (h2) {
          flush();
          const tag = h2[1].toUpperCase();
          if (tag === 'TODAYS_STORY' || tag === 'ONE_LINER') {
            mode = tag; currentCat = null; currentItem = null;
          } else if (CAT_NAMES[tag]) {
            mode = 'CATEGORY'; currentCat = tag;
            result.categories[tag] = []; currentItem = null;
          }
          currentSection = null;
          continue;
        }

        const h3 = line.match(/^###\s+(.+)/);
        if (h3 && mode === 'CATEGORY') {
          flush();
          currentItem = { headline: h3[1].trim(), summary: '', whyItMatters: '', context: '', marketImplication: '' };
          result.categories[currentCat].push(currentItem);
          currentSection = 'summary';
          continue;
        }

        const h4 = line.match(/^####\s+(.+)/);
        if (h4 && currentItem) {
          flush();
          const sec = h4[1].toLowerCase().trim();
          if (sec.startsWith('why')) currentSection = 'whyItMatters';
          else if (sec.startsWith('context')) currentSection = 'context';
          else if (sec.startsWith('market')) currentSection = 'marketImplication';
          continue;
        }

        buffer.push(line);
      }
      flush();
      return result;
    }

    function mdToHtml(md) {
      if (!md) return '';
      const lines = md.split('\n');
      let html = '';
      let inTable = false;
      let para = [];
      let tableHasHeader = false;

      const flushPara = () => {
        if (para.length) {
          html += `<p>${para.join(' ').trim()}</p>`;
          para = [];
        }
      };

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (line.match(/^\|.*\|$/)) {
          flushPara();
          if (!inTable) { html += '<table>'; inTable = true; tableHasHeader = false; }
          const cells = line.split('|').slice(1, -1).map(c => c.trim());
          if (cells.every(c => /^-+$/.test(c))) { tableHasHeader = true; continue; }
          const tag = !tableHasHeader && !html.endsWith('</tr></table>') && html.lastIndexOf('<tr>') < html.lastIndexOf('<table>') ? 'th' : (!tableHasHeader ? 'th' : 'td');
          html += `<tr>${cells.map(c => `<${tag}>${escapeHtml(c)}</${tag}>`).join('')}</tr>`;
          if (!tableHasHeader) tableHasHeader = true;
        } else {
          if (inTable) { html += '</table>'; inTable = false; }
          if (line.trim() === '') flushPara();
          else para.push(escapeHtml(line.trim()));
        }
      }
      flushPara();
      if (inTable) html += '</table>';
      return html;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function formatDateLong(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    }

    function render(data) {
      const dateLong = formatDateLong(data.date);
      let content = '';

      for (const cat of ['US', 'ASIA', 'ME', 'CAPITAL']) {
        const items = data.categories[cat] || [];
        if (!items.length) continue;
        let itemsHtml = '';
        for (const it of items) {
          itemsHtml += `
            <details class="item">
              <summary class="item-head">
                <div>
                  <div class="item-headline">${escapeHtml(it.headline)}</div>
                  ${it.summary ? `<div class="item-summary">${escapeHtml(it.summary)}</div>` : ''}
                </div>
                <span class="item-toggle">+</span>
              </summary>
              <div class="item-body">
                ${it.whyItMatters ? `<h4>Why it matters</h4>${mdToHtml(it.whyItMatters)}` : ''}
                ${it.context ? `<h4>Context</h4>${mdToHtml(it.context)}` : ''}
                ${it.marketImplication ? `<h4>Market Implication</h4>${mdToHtml(it.marketImplication)}` : ''}
              </div>
            </details>`;
        }
        content += `
          <section class="category ${CAT_CLASSES[cat]}">
            <div class="category-header">${CAT_NAMES[cat]}</div>
            ${itemsHtml}
          </section>`;
      }

      return `
        <header class="header">
          <div class="date">${dateLong}</div>
          <h1 class="title">저녁 브리핑</h1>
        </header>
        <div class="story">${mdToHtml(data.todaysStory)}</div>
        ${content}
        <div class="oneliner">
          <div class="oneliner-label">오늘의 한 줄</div>
          ${mdToHtml(data.oneLiner)}
        </div>
        <footer class="footer">
          <a href="archive.html">아카이브</a>
        </footer>`;
    }

    function renderEmpty() {
      return `
        <div class="empty">
          <div class="big">아직 브리핑이 없습니다</div>
          <div>매일 저녁 9시에 자동 생성됩니다.</div>
        </div>`;
    }

    async function init() {
      const app = document.getElementById('app');
      try {
        const md = await fetchLatestBriefing();
        if (!md) {
          app.innerHTML = renderEmpty();
          return;
        }
        const data = parseMarkdown(md);
        app.innerHTML = render(data);
      } catch (e) {
        app.innerHTML = `
          <div class="empty">
            <div class="big">불러오기 실패</div>
            <div>${escapeHtml(e.message)}</div>
          </div>`;
      }
    }

    init();
  </script>
</body>
</html>
