<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>저녁 브리핑</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Evening">

  <!-- Fonts -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --bg-elev: #ffffff;
      --bg-sunk: #f6f7f9;
      --bg-sunk-2: #eef0f4;
      --ink: #0b1220;
      --ink-2: #2b3340;
      --ink-3: #5b6473;
      --ink-4: #939aa6;
      --ink-5: #c5c9d2;
      --line: #e6e8ee;
      --line-soft: #eef0f4;
      --accent: #1d3a8a;
      --accent-strong: #142a66;
      --accent-soft: #e8edfa;
      --accent-ink: #0d1f4d;
      --radius: 14px;
      --radius-sm: 10px;
    }

    :root.dark {
      --bg: #0b0e15;
      --bg-elev: #11151e;
      --bg-sunk: #161b27;
      --bg-sunk-2: #1d2330;
      --ink: #f1f3f8;
      --ink-2: #c8cdd8;
      --ink-3: #8a92a3;
      --ink-4: #5b6273;
      --ink-5: #383e4c;
      --line: #1f2531;
      --line-soft: #181d27;
      --accent: #6b8bff;
      --accent-strong: #8aa3ff;
      --accent-soft: #1a2247;
      --accent-ink: #b9caff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      font-feature-settings: "ss01", "tnum";
    }
    body { padding-top: env(safe-area-inset-top); }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    /* ---------- Top bar ---------- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.01em;
    }
    .brand-mark {
      font-weight: 700;
      font-size: 17px;
      color: var(--accent);
    }
    .brand-mark::before {
      content: "";
      display: inline-block;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      margin-right: 8px;
      transform: translateY(-2px);
    }
    .brand-label {
      font-size: 17px;
      color: var(--accent);
      letter-spacing: -0.01em;
      font-weight: 700;
    }
    .top-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--bg-elev);
      color: var(--ink-2);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.15s ease;
      font-family: inherit;
      text-decoration: none;
    }
    .icon-btn:hover { border-color: var(--ink-4); color: var(--ink); }
    .icon-btn:active { transform: scale(0.96); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ---------- Masthead ---------- */
    .masthead {
      padding: 12px 0 28px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding: 5px 10px;
      background: var(--accent-soft);
      border-radius: 999px;
    }
    .eyebrow .pulse {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
    }
    .masthead h1 {
      font-weight: 700;
      font-size: clamp(30px, 7.5vw, 44px);
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 14px;
      text-wrap: balance;
    }
    .masthead h1 .accent { color: var(--accent); }
    .masthead-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--ink-3);
      font-weight: 500;
    }
    .masthead-meta .dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--ink-4);
    }

    /* ---------- Story ---------- */
    .story {
      padding: 22px 22px 24px;
      margin-bottom: 36px;
      background: var(--bg-sunk);
      border-radius: var(--radius);
      border: 1px solid var(--line-soft);
    }
    .story-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .story p {
      font-size: clamp(16px, 4vw, 18px);
      line-height: 1.6;
      letter-spacing: -0.012em;
      color: var(--ink);
      font-weight: 500;
      text-wrap: pretty;
    }
    .story p + p { margin-top: 10px; }

    /* ---------- Category ---------- */
    .category { margin-bottom: 40px; }
    .cat-head {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding-bottom: 12px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--line);
    }
    .cat-num {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
      color: var(--accent);
      min-width: 24px;
      font-variant-numeric: tabular-nums;
    }
    .cat-title {
      flex: 1;
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.015em;
    }
    .cat-sub {
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ---------- Item (accordion) ---------- */
    .item {
      border-bottom: 1px solid var(--line-soft);
      transition: background 0.15s ease;
    }
    .item:last-child { border-bottom: none; }
    .item-head {
      list-style: none;
      cursor: pointer;
      padding: 18px 4px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
      user-select: none;
    }
    .item-head::-webkit-details-marker { display: none; }
    .item-headline {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--ink);
      letter-spacing: -0.012em;
      text-wrap: balance;
    }
    .item-summary {
      font-size: 14px;
      color: var(--ink-3);
      line-height: 1.55;
      margin-top: 6px;
      text-wrap: pretty;
      font-weight: 500;
    }
    .item-toggle {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--ink-3);
      transition: all 0.2s ease;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--bg-elev);
    }
    .item-toggle svg { width: 12px; height: 12px; transition: transform 0.25s ease; }
    .item[open] .item-toggle {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .item[open] .item-toggle svg { transform: rotate(45deg); }

    .item-body {
      padding: 4px 4px 24px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .item-body .block { padding: 14px 0 0; }
    .item-body .block + .block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed var(--line);
    }
    .item-body h4 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .item-body p {
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--ink-2);
      margin-bottom: 10px;
      text-wrap: pretty;
      font-weight: 400;
    }
    .item-body p:last-child { margin-bottom: 0; }
    .item-body strong { color: var(--ink); font-weight: 700; }

    .item-body table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      margin: 12px 0;
      background: var(--bg-sunk);
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--line-soft);
    }
    .item-body th, .item-body td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--line-soft);
    }
    .item-body tr:last-child th, .item-body tr:last-child td { border-bottom: none; }
    .item-body th {
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-3);
      font-weight: 700;
      background: var(--bg-sunk-2);
    }
    .item-body td { color: var(--ink-2); font-weight: 500; }

    /* ---------- Market summary ---------- */
    .market-bar {
      margin-top: 32px;
      padding: 18px 20px;
      background: var(--bg-sunk);
      border-radius: var(--radius);
      border: 1px solid var(--line-soft);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .market-bar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      padding-top: 2px;
    }
    .market-bar-text {
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--ink-2);
      font-weight: 500;
    }

    /* ---------- Footer ---------- */
    .footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 12px;
      color: var(--ink-4);
      font-weight: 500;
    }
    .footer a {
      color: var(--ink-3);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s ease;
    }
    .footer a:hover { color: var(--accent); }

    /* ---------- States ---------- */
    .state { text-align: center; padding: 80px 20px; }
    .state-mark {
      display: inline-grid;
      place-items: center;
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .state-title { font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.015em; }
    .state-sub { font-size: 14px; color: var(--ink-3); }

    .skeleton {
      background: linear-gradient(90deg, var(--line-soft) 0%, var(--bg-sunk) 50%, var(--line-soft) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-block { padding: 20px 0; border-bottom: 1px solid var(--line-soft); }
    .skel-h { height: 18px; width: 70%; margin-bottom: 10px; }
    .skel-l { height: 12px; width: 90%; margin-bottom: 6px; }
    .skel-l.short { width: 60%; }

    @media (hover: none) { .item-head:active { background: var(--bg-sunk); } }

    @media (max-width: 480px) {
      .container { padding: 20px 16px 60px; }
      .masthead { padding-top: 4px; padding-bottom: 22px; margin-bottom: 24px; }
      .story { padding: 18px 18px 20px; margin-bottom: 28px; }
      .category { margin-bottom: 32px; }
      .item-head { padding: 16px 2px; }
      .item-headline { font-size: 15.5px; }
      .item-summary { font-size: 13.5px; }
      .cat-title { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="topbar">
      <div class="brand">
        <span class="brand-mark">Evening</span>
        <span class="brand-label">Briefing</span>
      </div>
      <div class="top-actions">
        <a href="archive.html" class="icon-btn" aria-label="아카이브" title="아카이브">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1.5" y="3" width="13" height="11" rx="1.5"/>
            <path d="M1.5 6.5h13M5.5 1.5v3M10.5 1.5v3"/>
          </svg>
        </a>
        <button class="icon-btn" id="theme-toggle" aria-label="테마 전환" title="테마 전환">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 9.5A5 5 0 1 1 6.5 2.5a4 4 0 0 0 7 7Z"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="content">
      <div class="skel-block"><div class="skeleton skel-h"></div><div class="skeleton skel-l"></div><div class="skeleton skel-l short"></div></div>
      <div class="skel-block"><div class="skeleton skel-h"></div><div class="skeleton skel-l"></div><div class="skeleton skel-l short"></div></div>
      <div class="skel-block"><div class="skeleton skel-h"></div><div class="sk
